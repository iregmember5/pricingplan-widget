[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

# SPA fallback — Netlify serves existing files first, then falls back
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200